<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Chrome DevTools Network Panel Guide</title>
  <desc id="desc">Annotated cheat sheet showing where to inspect Time, Waterfall, TTFB, Size, and JS or CSS filters in the Network panel.</desc>

  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .header { fill: #1e293b; }
      .headerText { fill: #f8fafc; font: 700 24px Segoe UI, Arial, sans-serif; }
      .subText { fill: #334155; font: 600 16px Segoe UI, Arial, sans-serif; }
      .label { fill: #0f172a; font: 700 15px Segoe UI, Arial, sans-serif; }
      .body { fill: #334155; font: 500 14px Segoe UI, Arial, sans-serif; }
      .small { fill: #475569; font: 500 12px Segoe UI, Arial, sans-serif; }
      .chip { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 1.5; }
      .calloutBlue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .calloutGreen { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .calloutAmber { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .calloutRose { fill: #ffe4e6; stroke: #e11d48; stroke-width: 2; }
      .mono { fill: #0f172a; font: 600 13px Consolas, Menlo, monospace; }
      .arrowBlue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .arrowGreen { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .arrowAmber { stroke: #d97706; stroke-width: 3; fill: none; marker-end: url(#arrowAmber); }
      .arrowRose { stroke: #e11d48; stroke-width: 3; fill: none; marker-end: url(#arrowRose); }
    </style>

    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#16a34a" />
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#d97706" />
    </marker>
    <marker id="arrowRose" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#e11d48" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="920" />
  <text x="60" y="55" class="headerText" fill="#0f172a">How to read Chrome DevTools Network panel quickly</text>
  <text x="60" y="84" class="subText">Focus on Time, Waterfall, TTFB, Size, and JS/CSS filters to find loading bottlenecks.</text>

  <rect class="panel" x="60" y="120" width="980" height="700" rx="12" />
  <rect class="header" x="60" y="120" width="980" height="48" rx="12" />
  <text x="82" y="151" class="headerText" font-size="20">Network</text>

  <rect class="chip" x="82" y="186" width="74" height="30" rx="8" /><text x="104" y="206" class="mono">All</text>
  <rect class="chip" x="164" y="186" width="66" height="30" rx="8" /><text x="184" y="206" class="mono">JS</text>
  <rect class="chip" x="238" y="186" width="72" height="30" rx="8" /><text x="258" y="206" class="mono">CSS</text>
  <text x="328" y="206" class="small">Use these filters first to isolate noisy requests.</text>

  <rect x="82" y="235" width="936" height="34" fill="#f1f5f9" stroke="#cbd5e1" />
  <text x="96" y="257" class="label">Name</text>
  <text x="382" y="257" class="label">Status</text>
  <text x="475" y="257" class="label">Type</text>
  <text x="560" y="257" class="label">Size</text>
  <text x="675" y="257" class="label">Time</text>
  <text x="760" y="257" class="label">Waterfall</text>

  <rect x="82" y="270" width="936" height="50" fill="#ffffff" stroke="#e2e8f0" />
  <text x="96" y="301" class="body">api/feed?page=1</text><text x="382" y="301" class="body">200</text><text x="475" y="301" class="body">fetch</text><text x="560" y="301" class="body">8.4 kB</text><text x="675" y="301" class="body">1.27 s</text>
  <rect x="760" y="287" width="120" height="16" fill="#22c55e" /><rect x="884" y="287" width="88" height="16" fill="#60a5fa" />

  <rect x="82" y="322" width="936" height="50" fill="#ffffff" stroke="#e2e8f0" />
  <text x="96" y="353" class="body">main.bundle.js</text><text x="382" y="353" class="body">200</text><text x="475" y="353" class="body">script</text><text x="560" y="353" class="body">1.9 MB</text><text x="675" y="353" class="body">2.44 s</text>
  <rect x="760" y="339" width="70" height="16" fill="#22c55e" /><rect x="834" y="339" width="170" height="16" fill="#60a5fa" />

  <rect x="82" y="374" width="936" height="50" fill="#ffffff" stroke="#e2e8f0" />
  <text x="96" y="405" class="body">styles.css</text><text x="382" y="405" class="body">200</text><text x="475" y="405" class="body">stylesheet</text><text x="560" y="405" class="body">310 kB</text><text x="675" y="405" class="body">1.11 s</text>
  <rect x="760" y="391" width="50" height="16" fill="#22c55e" /><rect x="814" y="391" width="92" height="16" fill="#60a5fa" />

  <rect x="82" y="426" width="936" height="50" fill="#ffffff" stroke="#e2e8f0" />
  <text x="96" y="457" class="body">recommendations.js</text><text x="382" y="457" class="body">200</text><text x="475" y="457" class="body">script</text><text x="560" y="457" class="body">420 kB</text><text x="675" y="457" class="body">0.92 s</text>
  <rect x="760" y="443" width="44" height="16" fill="#22c55e" /><rect x="808" y="443" width="88" height="16" fill="#60a5fa" />

  <rect x="82" y="478" width="936" height="50" fill="#ffffff" stroke="#e2e8f0" />
  <text x="96" y="509" class="body">avatar-hero.avif</text><text x="382" y="509" class="body">200</text><text x="475" y="509" class="body">image</text><text x="560" y="509" class="body">690 kB</text><text x="675" y="509" class="body">1.78 s</text>
  <rect x="760" y="495" width="80" height="16" fill="#22c55e" /><rect x="844" y="495" width="136" height="16" fill="#60a5fa" />

  <text x="82" y="562" class="small">Green segment in waterfall: wait for first byte (TTFB). Blue segment: content download time.</text>

  <rect class="calloutBlue" x="1070" y="188" width="300" height="112" rx="12" />
  <text x="1088" y="216" class="label">1) Filter by JS / CSS</text>
  <text x="1088" y="238" class="body">Find if too many scripts/styles</text>
  <text x="1088" y="258" class="body">are loaded on initial page load.</text>
  <path class="arrowBlue" d="M1070,246 C1010,246 960,220 310,202" />

  <rect class="calloutGreen" x="1070" y="330" width="300" height="132" rx="12" />
  <text x="1088" y="360" class="label">2) Sort by Time</text>
  <text x="1088" y="382" class="body">Requests over ~1s are suspects.</text>
  <text x="1088" y="404" class="body">Start investigation from slowest.</text>
  <path class="arrowGreen" d="M1070,394 C1020,394 980,360 700,352" />

  <rect class="calloutAmber" x="1070" y="488" width="300" height="150" rx="12" />
  <text x="1088" y="518" class="label">3) Read Waterfall</text>
  <text x="1088" y="540" class="body">Long green = high TTFB -> server side</text>
  <text x="1088" y="562" class="body">Long blue = big payload -> optimize size</text>
  <text x="1088" y="584" class="body">Stair-step bars = sequential loading</text>
  <path class="arrowAmber" d="M1070,560 C1018,560 990,525 880,500" />

  <rect class="calloutRose" x="1070" y="660" width="300" height="140" rx="12" />
  <text x="1088" y="690" class="label">4) Check Size column</text>
  <text x="1088" y="712" class="body">Large JS/CSS/images are red flags.</text>
  <text x="1088" y="734" class="body">Look for compression + code splitting.</text>
  <path class="arrowRose" d="M1070,726 C1008,726 980,645 590,352" />

  <rect x="60" y="840" width="1310" height="52" fill="#0f172a" rx="10" />
  <text x="82" y="872" class="headerText" font-size="19">Quick rule: TTFB high -> backend/CDN issue. Download high -> payload issue. Sequential waterfall -> dependency chain issue.</text>
</svg>