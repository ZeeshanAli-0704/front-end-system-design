<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowdown" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="5,0 10,10 0,10" fill="#333"/>
    </marker>
    <marker id="arrowright" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="40" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    INP (Interaction to Next Paint) - User Click to Visual Update
  </text>
  
  <!-- Timeline axis -->
  <line x1="100" y1="650" x2="1150" y2="650" stroke="#333" stroke-width="2"/>
  
  <!-- Time markers -->
  <text x="100" y="680" font-size="12" fill="#666" text-anchor="middle">0ms</text>
  <text x="300" y="680" font-size="12" fill="#666" text-anchor="middle">50ms</text>
  <text x="500" y="680" font-size="12" fill="#666" text-anchor="middle">100ms</text>
  <text x="700" y="680" font-size="12" fill="#666" text-anchor="middle">150ms</text>
  <text x="900" y="680" font-size="12" fill="#666" text-anchor="middle">200ms</text>
  <text x="1100" y="680" font-size="12" fill="#666" text-anchor="middle">250ms</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="80" x2="100" y2="650" stroke="#999" stroke-width="2"/>
  <line x1="300" y1="80" x2="300" y2="650" stroke="#ddd" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="500" y1="80" x2="500" y2="650" stroke="#ddd" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="700" y1="80" x2="700" y2="650" stroke="#ddd" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="900" y1="80" x2="900" y2="650" stroke="#ddd" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="1100" y1="80" x2="1100" y2="650" stroke="#ddd" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- SECTION 1: USER INTERACTION -->
  <rect x="80" y="100" width="50" height="50" fill="#FFE6E6" stroke="#FF6B6B" stroke-width="2" rx="5"/>
  <text x="105" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">USER</text>
  <text x="105" y="140" font-size="10" text-anchor="middle" fill="#666">CLICK</text>
  
  <!-- Arrow down -->
  <line x1="105" y1="150" x2="105" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrowdown)"/>
  
  <!-- SECTION 2: EVENT HANDLER RUNS -->
  <rect x="80" y="180" width="220" height="80" fill="#FFD700" stroke="#999" stroke-width="2" rx="5"/>
  <text x="190" y="200" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Event Handler</text>
  <text x="190" y="218" font-size="11" text-anchor="middle" fill="#333">updateState() {</text>
  <text x="190" y="235" font-size="11" text-anchor="middle" fill="#666">  parseData()   // 30ms</text>
  <text x="190" y="252" font-size="11" text-anchor="middle" fill="#666">}</text>
  <text x="190" y="270" font-size="10" font-weight="bold" text-anchor="middle" fill="#E74C3C">⚠ 75ms TOTAL</text>
  
  <!-- Arrow -->
  <path d="M 300 220 L 380 220" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowright)"/>
  
  <!-- SECTION 3: BROWSER PROCESSING -->
  <g>
    <!-- Render -->
    <rect x="380" y="190" width="90" height="25" fill="#9370DB" stroke="#999" stroke-width="1" rx="3"/>
    <text x="425" y="208" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">Re-render</text>
    <text x="425" y="222" font-size="9" text-anchor="middle" fill="#fff">20ms</text>
    
    <!-- Paint -->
    <rect x="480" y="190" width="80" height="25" fill="#90EE90" stroke="#999" stroke-width="1" rx="3"/>
    <text x="520" y="208" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">Paint</text>
    <text x="520" y="222" font-size="9" text-anchor="middle" fill="#666">10ms</text>
    
    <!-- Composite -->
    <rect x="570" y="190" width="60" height="25" fill="#87CEEB" stroke="#999" stroke-width="1" rx="3"/>
    <text x="600" y="208" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">Comp</text>
    <text x="600" y="222" font-size="9" text-anchor="middle" fill="#666">5ms</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 630 220 L 680 220" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowright)"/>
  
  <!-- SECTION 4: VISUAL UPDATE -->
  <rect x="680" y="180" width="100" height="80" fill="#2ECC71" stroke="#27AE60" stroke-width="3" rx="5"/>
  <text x="730" y="210" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">VISUAL</text>
  <text x="730" y="230" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">UPDATE</text>
  <text x="730" y="250" font-size="11" text-anchor="middle" fill="#fff">VISIBLE!</text>
  
  <!-- TIMING ANNOTATIONS -->
  <g id="timing">
    <!-- User input to handler start -->
    <line x1="100" y1="340" x2="100" y2="360" stroke="#FF6B6B" stroke-width="2"/>
    <line x1="100" y1="350" x2="105" y2="350" stroke="#FF6B6B" stroke-width="2"/>
    
    <line x1="100" y1="350" x2="300" y2="350" stroke="#FF6B6B" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="300" y1="340" x2="300" y2="360" stroke="#FF6B6B" stroke-width="2"/>
    <line x1="295" y1="350" x2="300" y2="350" stroke="#FF6B6B" stroke-width="2"/>
    
    <text x="200" y="375" font-size="11" font-weight="bold" text-anchor="middle" fill="#FF6B6B">Event Handler: 75ms</text>
    
    <!-- Browser processing -->
    <line x1="300" y1="390" x2="300" y2="410" stroke="#9370DB" stroke-width="2"/>
    <line x1="300" y1="400" x2="305" y2="400" stroke="#9370DB" stroke-width="2"/>
    
    <line x1="300" y1="400" x2="570" y2="400" stroke="#9370DB" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="570" y1="390" x2="570" y2="410" stroke="#9370DB" stroke-width="2"/>
    <line x1="565" y1="400" x2="570" y2="400" stroke="#9370DB" stroke-width="2"/>
    
    <text x="435" y="425" font-size="11" font-weight="bold" text-anchor="middle" fill="#9370DB">Browser: 35ms</text>
    
    <!-- Total INP -->
    <line x1="100" y1="450" x2="100" y2="470" stroke="#FF4444" stroke-width="3"/>
    <line x1="100" y1="460" x2="105" y2="460" stroke="#FF4444" stroke-width="3"/>
    
    <line x1="100" y1="460" x2="680" y2="460" stroke="#FF4444" stroke-width="3" stroke-dasharray="5,5"/>
    <line x1="680" y1="450" x2="680" y2="470" stroke="#FF4444" stroke-width="3"/>
    <line x1="675" y1="460" x2="680" y2="460" stroke="#FF4444" stroke-width="3"/>
    
    <rect x="340" y="475" width="100" height="35" fill="#FFE6E6" stroke="#FF4444" stroke-width="2" rx="5"/>
    <text x="390" y="495" font-size="12" font-weight="bold" text-anchor="middle" fill="#E74C3C">INP: 110ms</text>
    <text x="390" y="510" font-size="10" text-anchor="middle" fill="#666">(Goal: &lt;200ms)</text>
  </g>
  
  <!-- PERFORMANCE VERDICT -->
  <g id="verdict">
    <rect x="800" y="120" width="350" height="180" fill="#fff" stroke="#999" stroke-width="2" rx="10"/>
    
    <text x="975" y="150" font-size="14" font-weight="bold" text-anchor="middle" fill="#E74C3C">
      ⚠ PERFORMANCE ISSUE
    </text>
    
    <text x="810" y="180" font-size="11" fill="#333">• INP: 110ms (⚠ Acceptable)</text>
    <text x="810" y="200" font-size="11" fill="#333">• Event Handler: 75ms (🔴 Too Long!)</text>
    <text x="810" y="220" font-size="11" fill="#333">• Opportunities:</text>
    <text x="825" y="237" font-size="10" fill="#666">- Split work into smaller chunks</text>
    <text x="825" y="252" font-size="10" fill="#666">- Use requestAnimationFrame()</text>
    <text x="825" y="267" font-size="10" fill="#666">- Defer non-critical work</text>
    <text x="825" y="282" font-size="10" fill="#666">- Profile to find bottleneck</text>
  </g>
  
  <!-- OPTIMAL SCENARIO -->
  <text x="600" y="570" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">
    ✓ OPTIMAL: Event Handler Should Be &lt;50ms
  </text>
  
  <rect x="200" y="600" width="50" height="30" fill="#FFE6E6" stroke="#FF6B6B" stroke-width="2"/>
  <text x="225" y="620" font-size="9" text-anchor="middle" fill="#333">Click</text>
  
  <rect x="280" y="600" width="80" height="30" fill="#FFD700" stroke="#999" stroke-width="2"/>
  <text x="320" y="620" font-size="9" text-anchor="middle" fill="#333">Handler</text>
  <text x="320" y="630" font-size="8" text-anchor="middle" fill="#666">50ms</text>
  
  <rect x="390" y="600" width="50" height="30" fill="#9370DB" stroke="#999" stroke-width="2"/>
  <text x="415" y="620" font-size="9" text-anchor="middle" fill="#fff">Render</text>
  <text x="415" y="630" font-size="8" text-anchor="middle" fill="#eee">8ms</text>
  
  <rect x="470" y="600" width="50" height="30" fill="#90EE90" stroke="#999" stroke-width="2"/>
  <text x="495" y="620" font-size="9" text-anchor="middle" fill="#333">Paint</text>
  <text x="495" y="630" font-size="8" text-anchor="middle" fill="#666">5ms</text>
  
  <rect x="550" y="600" width="40" height="30" fill="#2ECC71" stroke="#27AE60" stroke-width="2"/>
  <text x="570" y="620" font-size="9" text-anchor="middle" fill="#fff">Done!</text>
  
  <text x="650" y="620" font-size="11" font-weight="bold" fill="#2ECC71">✓ Total: 63ms (Good!)</text>
</svg>