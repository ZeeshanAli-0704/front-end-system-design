<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    Flame Chart Example: Page Render Performance
  </text>
  
  <!-- Legend -->
  <g id="legend" transform="translate(50, 50)">
    <rect x="0" y="0" width="20" height="20" fill="#FFD700" stroke="#999" stroke-width="1"/>
    <text x="30" y="15" font-size="12" fill="#333">JavaScript</text>
    
    <rect x="200" y="0" width="20" height="20" fill="#9370DB" stroke="#999" stroke-width="1"/>
    <text x="230" y="15" font-size="12" fill="#333">Rendering</text>
    
    <rect x="400" y="0" width="20" height="20" fill="#90EE90" stroke="#999" stroke-width="1"/>
    <text x="430" y="15" font-size="12" fill="#333">Painting</text>
    
    <rect x="600" y="0" width="20" height="20" fill="#87CEEB" stroke="#999" stroke-width="1"/>
    <text x="630" y="15" font-size="12" fill="#333">Composite</text>
  </g>
  
  <!-- Time axis -->
  <line x1="100" y1="550" x2="950" y2="550" stroke="#333" stroke-width="2"/>
  <text x="100" y="580" font-size="12" fill="#666">0ms</text>
  <text x="300" y="580" font-size="12" fill="#666">200ms</text>
  <text x="500" y="580" font-size="12" fill="#666">400ms</text>
  <text x="700" y="580" font-size="12" fill="#666">600ms</text>
  <text x="900" y="580" font-size="12" fill="#666">800ms</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="150" x2="950" y2="150" stroke="#eee" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="200" x2="950" y2="200" stroke="#eee" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="250" x2="950" y2="250" stroke="#eee" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="300" x2="950" y2="300" stroke="#eee" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="350" x2="950" y2="350" stroke="#eee" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="400" x2="950" y2="400" stroke="#eee" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="450" x2="950" y2="450" stroke="#eee" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Y-axis labels -->
  <text x="70" y="430" font-size="11" fill="#666" text-anchor="end">Main Thread</text>
  <text x="70" y="380" font-size="11" fill="#666" text-anchor="end">v8::ScriptExecution</text>
  <text x="70" y="330" font-size="11" fill="#666" text-anchor="end">React Render</text>
  <text x="70" y="280" font-size="11" fill="#666" text-anchor="end">Layout</text>
  <text x="70" y="230" font-size="11" fill="#666" text-anchor="end">Paint</text>
  <text x="70" y="180" font-size="11" fill="#666" text-anchor="end">Composite</text>
  
  <!-- FRAME 1: render() - 850ms total -->
  <g id="render_main">
    <!-- JavaScript: processData() -->
    <rect x="100" y="380" width="200" height="30" fill="#FFD700" stroke="#999" stroke-width="1"/>
    <text x="200" y="400" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">processData()</text>
    <text x="200" y="413" font-size="10" text-anchor="middle" fill="#666">200ms</text>
    
    <!-- JavaScript: reconcile() -->
    <rect x="310" y="330" width="150" height="30" fill="#FFD700" stroke="#999" stroke-width="1"/>
    <text x="385" y="350" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">reconcile()</text>
    <text x="385" y="363" font-size="10" text-anchor="middle" fill="#666">150ms</text>
    
    <!-- JavaScript: updateState() -->
    <rect x="470" y="330" width="180" height="30" fill="#FFD700" stroke="#999" stroke-width="1"/>
    <text x="560" y="350" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">updateState()</text>
    <text x="560" y="363" font-size="10" text-anchor="middle" fill="#666">180ms</text>
    
    <!-- Rendering: Layout recalc -->
    <rect x="100" y="280" width="120" height="30" fill="#9370DB" stroke="#999" stroke-width="1"/>
    <text x="160" y="300" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">Layout</text>
    <text x="160" y="313" font-size="10" text-anchor="middle" fill="#ddd">120ms</text>
    
    <!-- Rendering: Style recalc -->
    <rect x="230" y="280" width="100" height="30" fill="#9370DB" stroke="#999" stroke-width="1"/>
    <text x="280" y="300" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">Style</text>
    <text x="280" y="313" font-size="10" text-anchor="middle" fill="#ddd">100ms</text>
    
    <!-- Painting -->
    <rect x="340" y="230" width="140" height="30" fill="#90EE90" stroke="#999" stroke-width="1"/>
    <text x="410" y="250" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Painting</text>
    <text x="410" y="263" font-size="10" text-anchor="middle" fill="#666">140ms</text>
    
    <!-- Composite -->
    <rect x="490" y="180" width="80" height="30" fill="#87CEEB" stroke="#999" stroke-width="1"/>
    <text x="530" y="200" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Composite</text>
    <text x="530" y="213" font-size="10" text-anchor="middle" fill="#666">80ms</text>
  </g>
  
  <!-- Annotations -->
  <g id="annotations">
    <!-- Arrow and label for long task -->
    <line x1="320" y1="420" x2="320" y2="480" stroke="#FF4444" stroke-width="2" marker-end="url(#arrowred)"/>
    <rect x="270" y="490" width="100" height="30" fill="#FFE6E6" stroke="#FF4444" stroke-width="2" rx="5"/>
    <text x="320" y="510" font-size="11" font-weight="bold" text-anchor="middle" fill="#FF4444">Long Task!</text>
    
    <!-- Total time annotation -->
    <text x="600" y="120" font-size="14" font-weight="bold" fill="#FF6600">Total Time: 850ms</text>
    <text x="600" y="140" font-size="12" fill="#666">❌ Not 60 FPS (need &lt;16.67ms)</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#FF4444"/>
    </marker>
  </defs>
</svg>